# Production — pas de ports publiés sur l'hôte (Traefik / Dockploy route en interne)
# Dev local : docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  web:
    build: .
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - cspi_data:/var/www/html/database/data
      - cspi_uploads:/var/www/html/public/uploads
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run/apache2:size=8M,uid=33,gid=33,mode=755
      - /var/log/apache2:size=32M,uid=33,gid=33,mode=755
    healthcheck:
      test: ["CMD", "docker/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  cspi_data:
  cspi_uploads:
